<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عيادة البروفيسور عدنان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --primary: #1e40af;
            --secondary: #0ea5e9;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light-bg: #f0f9ff;
            --white: #ffffff;
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text-dark);
            line-height: 1.6;
            font-size: 16px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 18px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .logo-icon {
            font-size: 28px;
            background: var(--white);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: var(--primary);
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
        }

        .logo-text p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
        }

        .btn-header {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .btn-header:active {
            background: rgba(255, 255, 255, 0.35);
        }

        /* Main Container */
        .main-container {
            width: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 100px);
        }

        /* Alert */
        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
            display: none;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }

        .alert.active {
            display: block;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* Card */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
        }

        /* Tabs */
        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            background: var(--light-bg);
            padding: 6px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 14px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 15px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            background: var(--white);
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Upload Area */
        .upload-area {
            border: 3px dashed var(--secondary);
            border-radius: 16px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.08), rgba(6, 182, 212, 0.08));
            transition: all 0.2s ease;
        }

        .upload-area:active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(6, 182, 212, 0.15));
            border-color: var(--accent);
        }

        .upload-area i {
            font-size: 48px;
            color: var(--secondary);
            margin-bottom: 12px;
        }

        .upload-area p {
            color: var(--text-dark);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .upload-area small {
            color: var(--text-light);
            font-size: 13px;
        }

        /* Buttons */
        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s ease;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 2px 8px rgba(30, 64, 175, 0.2);
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
        }

        /* Loading Screen */
        .loading-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-screen.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(14, 165, 233, 0.3);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .istighfar-text {
            color: var(--secondary);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Results */
        .results-container {
            display: none;
        }

        .results-container.active {
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 700;
            margin-bottom: 16px;
            font-size: 15px;
        }

        .status-badge.normal {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-badge.warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .status-badge.critical {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .result-section {
            margin-bottom: 20px;
        }

        .result-section h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .result-section p {
            color: var(--text-dark);
            line-height: 1.8;
            font-size: 15px;
        }

        /* Indicators */
        .indicator-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--light-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            border-right: 3px solid var(--secondary);
        }

        .indicator-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 15px;
        }

        .indicator-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .indicator-status {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .indicator-status.normal {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .indicator-status.high {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
        }

        .indicator-status.low {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* Medications */
        .medication-card {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.08), rgba(6, 182, 212, 0.08));
            border: 2px solid var(--secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .medication-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .medication-type {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .medication-description {
            color: var(--text-dark);
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .medication-dosage {
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .medication-usage {
            color: var(--text-dark);
            font-size: 14px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(14, 165, 233, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            justify-content: flex-end;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px 20px 0 0;
            padding: 24px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
        }

        .modal-content h2 {
            margin-bottom: 18px;
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            -webkit-appearance: none;
            appearance: none;
        }

        .modal-buttons .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .modal-buttons .btn-cancel {
            background: #e5e7eb;
            color: var(--text-dark);
        }

        .contact-section {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.12), rgba(6, 182, 212, 0.12));
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            border-right: 3px solid var(--secondary);
        }

        .contact-section h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 700;
        }

        .contact-section p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .contact-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            -webkit-appearance: none;
            appearance: none;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Health Warning */
        .health-warning {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.12), rgba(244, 63, 94, 0.12));
            border: 2px solid var(--danger);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .health-warning i {
            font-size: 18px;
            color: var(--danger);
            flex-shrink: 0;
        }

        .health-warning p {
            color: var(--danger);
            font-size: 14px;
            font-weight: 600;
        }

        /* Multiple Results Pages */
        .results-pages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-page {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            border: 2px solid var(--secondary);
            page-break-inside: avoid;
        }

        .page-header {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--secondary);
        }

        /* Result Actions */
        .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }

        .result-actions .btn {
            flex: 1;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-stethoscope"></i>
            </div>
            <div class="logo-text">
                <h1>البروفيسور عدنان</h1>
                <p>عيادة التحليل الذكي</p>
            </div>
        </div>
        <button class="btn-header" onclick="openSettings()">
            <i class="fas fa-cog"></i> إعدادات
        </button>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Card -->
        <div class="card" id="inputCard">
            <!-- Tabs -->
            <div class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab('upload')">
                    <i class="fas fa-file-upload"></i> رفع
                </button>
                <button class="tab-btn" onclick="switchTab('text')">
                    <i class="fas fa-keyboard"></i> نص
                </button>
            </div>

            <!-- Upload Tab -->
            <div id="upload" class="tab-content active">
                <div class="form-group">
                    <label>رفع التقرير</label>
                    <div class="upload-area" id="uploadArea" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>اسحب أو انقر</p>
                        <small>JPG • PNG • TIFF • BMP</small>
                        <input type="file" id="fileInput" style="display: none;" accept=".jpg,.jpeg,.png,.tiff,.bmp" onchange="handleFileSelect(event)">
                    </div>
                </div>

                <div class="form-group">
                    <label>العمر (اختياري)</label>
                    <input type="number" id="ageUpload" placeholder="السنوات" min="0" max="150">
                </div>

                <button class="btn btn-primary" onclick="analyzeFile()">
                    <i class="fas fa-magic"></i> تحليل التقرير
                </button>
            </div>

            <!-- Text Tab -->
            <div id="text" class="tab-content">
                <div class="form-group">
                    <label>وصف الحالة الطبية</label>
                    <textarea id="diagnosisText" placeholder="أدخل وصف الحالة الطبية بالتفصيل..."></textarea>
                </div>

                <div class="form-group">
                    <label>العمر (اختياري)</label>
                    <input type="number" id="ageText" placeholder="السنوات" min="0" max="150">
                </div>

                <button class="btn btn-primary" onclick="analyzeText()">
                    <i class="fas fa-magic"></i> تحليل الحالة
                </button>
            </div>

            <div class="health-warning">
                <i class="fas fa-exclamation-triangle"></i>
                <p>الدخان ضار بالصحة - ابتعد عنه لحياة صحيحة</p>
            </div>
        </div>

        <!-- Results -->
        <div id="resultsContainer" class="results-container card">
            <div id="resultsContent"></div>
            <div class="result-actions">
                <button class="btn btn-primary" onclick="downloadPDF()">
                    <i class="fas fa-download"></i> تحميل PDF
                </button>
            </div>
            <button class="btn btn-primary" onclick="resetForm()" style="margin-top: 12px;">
                <i class="fas fa-redo"></i> جديد
            </button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <div class="istighfar-text" id="istighfarText">استغفر الله...</div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-cog"></i> الإعدادات</h2>
            <div class="form-group">
                <label>مفتاح التفعيل المؤقت</label>
                <input type="password" id="apiKeyInput" placeholder="أدخل المفتاح">
            </div>
            <div class="contact-section">
                <h4><i class="fab fa-whatsapp"></i> هل تحتاج مفتاح؟</h4>
                <p>تواصل معنا عبر WhatsApp</p>
                <a href="https://wa.me/963959651343?text=مرحباً%20أنا%20أحتاج%20مفتاح%20" target="_blank" class="contact-btn">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveSettings()">حفظ</button>
                <button class="btn-cancel" onclick="closeSettings()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const ISTIGHFAR_PHRASES = [
            'استغفر الله...',
            'سبحان الله...',
            'لا حول ولا قوة الا بالله...',
            'يا الله...',
            'الحمد لله...',
            'اللهم أشفني...',
            'بسم الله...',
            'يا حي يا قيوم...',
            'لا إله إلا الله...',
            'اللهم اجعل هذا نافعاً...',
        ];

        const SYSTEM_PROMPT = `أنت البروفيسور عدنان، طبيب متخصص. قم بتحليل التقرير الطبي بدقة مع مراعاة العمر.
عند وصف الأدوية، يجب أن تكون "طريقة الاستعمال" دقيقة جداً وتشمل (مثلاً: قبل الطعام بـ 30 دقيقة، بعد الطعام مباشرة، وسط الأكل، قبل النوم، إلخ).
الرد بصيغة JSON حصراً:
{
  "overall_status": "normal|warning|critical",
  "summary": "ملخص عام",
  "analysis": "تحليل تفصيلي",
  "indicators": [{"name": "اسم", "value": "القيمة", "unit": "الوحدة", "normal_range": "النطاق", "status": "normal|high|low"}],
  "recommendations": "توصيات",
  "medications": [{"name": "اسم الدواء", "type": "نوع الدواء", "description": "وصف الدواء", "dosage": "الجرعة", "usage_method": "طريقة الاستعمال التفصيلية (مثلاً: قبل/بعد الأكل)"}]
}`;

        let currentFiles = [];
        let istighfarIndex = 0;

        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('uploadArea').style.opacity = '0.7';
        }

        function handleDragLeave(e) {
            document.getElementById('uploadArea').style.opacity = '1';
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('uploadArea').style.opacity = '1';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                currentFiles = Array.from(files);
                const fileNames = currentFiles.map(f => f.name).join(', ');
                showAlert(`تم اختيار ${currentFiles.length} ملف: ${fileNames}`, 'success');
            }
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length > 0) {
                currentFiles = Array.from(files);
                const fileNames = currentFiles.map(f => f.name).join(', ');
                showAlert(`تم اختيار ${currentFiles.length} ملف: ${fileNames}`, 'success');
            }
        }

        async function analyzeFile() {
            const apiKey = localStorage.getItem('apiKey');
            if (!apiKey) {
                showAlert('أدخل مفتاح', 'error');
                openSettings();
                return;
            }

            if (currentFiles.length === 0) {
                showAlert('اختر ملف على الأقل', 'error');
                return;
            }

            const age = document.getElementById('ageUpload').value;
            showLoading(true);

            try {
                let allAnalysis = [];
                for (let i = 0; i < currentFiles.length; i++) {
                    const file = currentFiles[i];
                    const base64 = await fileToBase64(file);
                    const mimeType = file.type || 'image/jpeg';
                    const analysis = await performAnalysisForFile(base64, age, mimeType);
                    allAnalysis.push({
                        fileName: file.name,
                        analysis: analysis
                    });
                }
                displayMultipleResults(allAnalysis);
            } catch (error) {
                let errorMessage = error.message;
                if (errorMessage.includes('401') || errorMessage.includes('429') || errorMessage.includes('quota') || errorMessage.includes('limit')) {
                    errorMessage = 'تم انتهاء المفتاح - تواصل مع المطور عبر WhatsApp';
                }
                showAlert('⚠ ' + errorMessage, 'error');
            } finally {
                showLoading(false);
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function performAnalysisForFile(data, age, mimeType) {
            const apiKey = localStorage.getItem('apiKey');
            const baseUrl = "https://openrouter.ai/api/v1";
            const model = "openai/gpt-4o-mini";

            const ageInfo = age ? `عمر المريض: ${age} سنة.` : "عمر المريض غير محدد.";
            const userMessage = `${ageInfo}\nقم بتحليل هذا التقرير الطبي.`;
            const messages = [
                { role: "system", content: SYSTEM_PROMPT },
                {
                    role: "user",
                    content: [
                        { type: "text", text: userMessage },
                        {
                            type: "image_url",
                            image_url: {
                                url: `data:${mimeType};base64,${data}`
                            }
                        }
                    ]
                }
            ];

            const response = await fetch(`${baseUrl}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: messages,
                    response_format: { type: "json_object" }
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'خطأ في الاتصال');
            }

            const result = await response.json();
            const analysisText = result.choices[0].message.content;
            return JSON.parse(analysisText);
        }

        async function analyzeText() {
            const apiKey = localStorage.getItem('apiKey');
            if (!apiKey) {
                showAlert('أدخل مفتاح', 'error');
                openSettings();
                return;
            }

            const text = document.getElementById('diagnosisText').value.trim();
            if (!text) {
                showAlert('أدخل النص', 'error');
                return;
            }

            const age = document.getElementById('ageText').value;
            showLoading(true);

            try {
                const analysis = await performTextAnalysis(text, age);
                displayTextResults(analysis);
            } catch (error) {
                let errorMessage = error.message;
                if (errorMessage.includes('401') || errorMessage.includes('429') || errorMessage.includes('quota') || errorMessage.includes('limit')) {
                    errorMessage = 'تم انتهاء المفتاح - تواصل مع المطور عبر WhatsApp';
                }
                showAlert('⚠ ' + errorMessage, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function performTextAnalysis(text, age) {
            const apiKey = localStorage.getItem('apiKey');
            const baseUrl = "https://openrouter.ai/api/v1";
            const model = "openai/gpt-4o-mini";

            const ageInfo = age ? `عمر المريض: ${age} سنة.` : "عمر المريض غير محدد.";
            const userMessage = `${ageInfo}\nالوصف الطبي:\n${text}`;
            const messages = [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "user", content: userMessage }
            ];

            const response = await fetch(`${baseUrl}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: messages,
                    response_format: { type: "json_object" }
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'خطأ في الاتصال');
            }

            const result = await response.json();
            const analysisText = result.choices[0].message.content;
            return JSON.parse(analysisText);
        }

        function displayTextResults(data) {
            let html = buildResultHTML(data);
            document.getElementById('resultsContent').innerHTML = html;
            window.currentAnalysisData = data;
            document.getElementById('resultsContainer').classList.add('active');
            document.getElementById('inputCard').style.display = 'none';
        }

        function displayMultipleResults(allAnalysis) {
            let html = '<div class="results-pages">';
            allAnalysis.forEach((item, index) => {
                html += `<div class="result-page">`;
                html += `<div class="page-header">الملف ${index + 1} من ${allAnalysis.length}: ${item.fileName}</div>`;
                html += buildResultHTML(item.analysis);
                html += `</div>`;
            });
            html += '</div>';
            document.getElementById('resultsContent').innerHTML = html;
            document.getElementById('resultsContainer').classList.add('active');
            document.getElementById('inputCard').style.display = 'none';
        }

        function buildResultHTML(data) {
            let html = `<span class="status-badge ${data.overall_status}">الحالة: ${getStatusLabel(data.overall_status)}</span>`;
            html += `<div class="result-section"><h3>الملخص</h3><p>${data.summary}</p></div>`;
            html += `<div class="result-section"><h3>التحليل</h3><p>${data.analysis}</p></div>`;
            
            if (data.indicators && data.indicators.length > 0) {
                html += '<div class="result-section"><h3>المؤشرات</h3>';
                data.indicators.forEach(indicator => {
                    html += `
                        <div class="indicator-row">
                            <div>
                                <div class="indicator-name">${indicator.name}</div>
                                <small>${indicator.unit}</small>
                            </div>
                            <div style="text-align: center;">
                                <div class="indicator-value">${indicator.value}</div>
                                <small>${indicator.normal_range}</small>
                            </div>
                            <span class="indicator-status ${indicator.status}">${getStatusLabel(indicator.status)}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            if (data.recommendations) {
                html += `<div class="result-section"><h3>التوصيات</h3><p>${data.recommendations}</p></div>`;
            }
            
            if (data.medications && data.medications.length > 0) {
                html += '<div class="result-section"><h3>الأدوية</h3>';
                data.medications.forEach(med => {
                    const usageHtml = med.usage_method ? `<div class="medication-usage"><strong>طريقة الاستعمال:</strong> ${med.usage_method}</div>` : '';
                    html += `
                        <div class="medication-card">
                            <div class="medication-name">${med.name}</div>
                            <span class="medication-type">${med.type}</span>
                            <div class="medication-description">${med.description}</div>
                            <div class="medication-dosage"><strong>الجرعة:</strong> ${med.dosage}</div>
                            ${usageHtml}
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            return html;
        }

        function getStatusLabel(status) {
            const labels = {
                'normal': '✓ طبيعي',
                'warning': '⚠ تحذير',
                'critical': '✕ حرج',
                'high': 'مرتفع',
                'low': 'منخفض'
            };
            return labels[status] || status;
        }

        function showLoading(show) {
            const loadingScreen = document.getElementById('loadingScreen');
            if (show) {
                loadingScreen.classList.add('active');
                istighfarIndex = 0;
                updateIstighfar();
            } else {
                loadingScreen.classList.remove('active');
            }
        }

        function updateIstighfar() {
            const text = document.getElementById('istighfarText');
            text.textContent = ISTIGHFAR_PHRASES[istighfarIndex];
            istighfarIndex = (istighfarIndex + 1) % ISTIGHFAR_PHRASES.length;
            if (document.getElementById('loadingScreen').classList.contains('active')) {
                setTimeout(updateIstighfar, 2000);
            }
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
            document.getElementById('apiKeyInput').value = localStorage.getItem('apiKey') || '';
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                showAlert('أدخل المفتاح', 'error');
                return;
            }
            localStorage.setItem('apiKey', apiKey);
            showAlert('تم الحفظ', 'success');
            closeSettings();
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} active`;
            setTimeout(() => {
                alert.classList.remove('active');
            }, 4000);
        }

        function downloadPDF() {
            const element = document.getElementById('resultsContent');
            const opt = {
                margin: 10,
                filename: 'التشخيص_الطبي.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function resetForm() {
            document.getElementById('diagnosisText').value = '';
            document.getElementById('ageText').value = '';
            document.getElementById('ageUpload').value = '';
            currentFiles = [];
            document.getElementById('resultsContainer').classList.remove('active');
            document.getElementById('inputCard').style.display = 'block';
        }

        window.addEventListener('click', (e) => {
            const settingsModal = document.getElementById('settingsModal');
            if (e.target === settingsModal) {
                closeSettings();
            }
        });
    </script>
</body>
</html>
